            "https://huggingface.co/mradermacher/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct.Q4_K_M.gguf"
            "https://huggingface.co/mradermacher/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct.Q8_0.gguf"
            "https://huggingface.co/mradermacher/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct.Q2_K.gguf"
            "https://huggingface.co/mradermacher/SmolLM-135M-Instruct-v0.2-GGUF/resolve/main/SmolLM-135M-Instruct-v0.2.Q4_K_M.gguf"
            "https://huggingface.co/mradermacher/SmolLM-135M-Instruct-v0.2-GGUF/resolve/main/SmolLM-135M-Instruct-v0.2.Q8_0.gguf"
            "https://huggingface.co/mradermacher/SmolLM-135M-Instruct-v0.2-GGUF/resolve/main/SmolLM-135M-Instruct-v0.2.Q2_K.gguf"
            "https://huggingface.co/mradermacher/SmolLM2-135M-GGUF/resolve/main/SmolLM2-135M.Q4_K_M.gguf"
            "https://huggingface.co/mradermacher/SmolLM2-135M-GGUF/resolve/main/SmolLM2-135M.Q8_0.gguf"
            "https://huggingface.co/mradermacher/SmolLM2-135M-GGUF/resolve/main/SmolLM2-135M.Q2_K.gguf"
          )

          SUCCESS=0
          for URL in "${URLS[@]}"; do
            echo "Trying: $URL"
            if curl -fL --max-time 120 --retry 2 \
                -H "User-Agent: Mozilla/5.0" \
                -o iso_root/model.gguf "$URL" 2>/dev/null; then
              SIZE=$(wc -c < iso_root/model.gguf)
              if [ "$SIZE" -gt 1048576 ]; then
                echo "SUCCESS: downloaded $(du -sh iso_root/model.gguf | cut -f1) from $URL"
                SUCCESS=1
                break
              else
                echo "File too small ($SIZE bytes), skipping."
                rm -f iso_root/model.gguf
              fi
            else
              echo "Failed, trying next..."
              rm -f iso_root/model.gguf
            fi
          done

          if [ "$SUCCESS" -eq 0 ]; then
            echo "ERROR: All model download URLs failed."
            exit 1
          fi

      - name: Assemble disc contents
        run: |
          if [ -f wii-dol/app.dol ]; then
            cp wii-dol/app.dol iso_root/boot.dol
          elif [ -f wii-dol/boot.dol ]; then
            cp wii-dol/boot.dol iso_root/boot.dol
          else
            echo "ERROR: no .dol found."
            exit 1
          fi
          ls -lh iso_root/

      - name: Create ISO
        run: |
          genisoimage \
            -o wii-ai-chatbot.iso \
            -V "WII_AI_CHATBOT" \
            -iso-level 2 \
            -r \
            iso_root/
          echo "ISO size: $(du -sh wii-ai-chatbot.iso | cut -f1)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-ai-chatbot-iso
          path: wii-ai-chatbot.iso

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wii-ai-chatbot.iso
          body: |
            ## WII-AI Chatbot — CD-ROM Image
            AI model baked in. Burn to CD-R and boot.

      - name: Create latest release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: wii-ai-chatbot.iso
          body: |
            ## Latest Build — WII-AI Chatbot (CD-ROM)
            AI model baked in. Burn to CD-R and boot.
