name: Build WII-AI Chatbot ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: compile the Wii DOL inside the devkitPPC container ─────────────
  build-dol:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DOL
        run: |
          cd wii
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      - name: Upload DOL artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-dol
          path: |
            wii/app.dol
            wii/boot.dol
          if-no-files-found: error

  # ── Job 2: download model, build ISO, publish release ─────────────────────
  build-iso:
    needs: build-dol
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install genisoimage
        run: sudo apt-get update -y && sudo apt-get install -y genisoimage

      - name: Download DOL artifact
        uses: actions/download-artifact@v4
        with:
          name: wii-dol
          path: wii-dol

      - name: Download AI model
        run: |
          mkdir -p iso_root
          curl -fL \
            -H "User-Agent: Mozilla/5.0" \
            -o iso_root/model.gguf \
            "https://huggingface.co/ggml-org/SmolLM-135M-Instruct-v0.2-Q2_K-GGUF/resolve/main/SmolLM-135M-Instruct-v0.2-Q2_K.gguf"
          echo "Model size: $(du -sh iso_root/model.gguf | cut -f1)"

      - name: Assemble disc contents
        run: |
          if [ -f wii-dol/app.dol ]; then
            cp wii-dol/app.dol iso_root/boot.dol
          elif [ -f wii-dol/boot.dol ]; then
            cp wii-dol/boot.dol iso_root/boot.dol
          else
            echo "ERROR: no .dol found."
            exit 1
          fi
          ls -lh iso_root/

      - name: Create ISO
        run: |
          genisoimage \
            -o wii-ai-chatbot.iso \
            -V "WII_AI_CHATBOT" \
            -iso-level 2 \
            -r \
            iso_root/
          echo "ISO size: $(du -sh wii-ai-chatbot.iso | cut -f1)"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-ai-chatbot-iso
          path: wii-ai-chatbot.iso

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wii-ai-chatbot.iso
          body: |
            ## WII-AI Chatbot — CD-ROM Image
            AI model baked in. Burn to CD-R and boot.

      - name: Create latest release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: wii-ai-chatbot.iso
          body: |
            ## Latest Build — WII-AI Chatbot (CD-ROM)
            AI model baked in. Burn to CD-R and boot.
