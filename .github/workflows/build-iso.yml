name: Build WII-AI Chatbot ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Install genisoimage + wget (toolchain already in container) ────
      - name: Install genisoimage and wget
        run: |
          apt-get update -y
          apt-get install -y genisoimage wget ca-certificates

      # ── 3. Build the Wii DOL ──────────────────────────────────────────────
      - name: Build DOL
        run: |
          cd wii
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      # ── 4. Download the ~35M AI model ─────────────────────────────────────
      - name: Download AI model
        run: |
          mkdir -p iso_root
          wget -q -O iso_root/model.gguf \
            "https://huggingface.co/ggml-org/SmolLM-135M-Instruct-v0.2-Q2_K-GGUF/resolve/main/SmolLM-135M-Instruct-v0.2-Q2_K.gguf"
          echo "Model size: $(du -sh iso_root/model.gguf | cut -f1)"

      # ── 5. Assemble ISO root ──────────────────────────────────────────────
      - name: Assemble disc contents
        run: |
          if [ -f wii/app.dol ]; then
            cp wii/app.dol iso_root/boot.dol
          elif [ -f wii/boot.dol ]; then
            cp wii/boot.dol iso_root/boot.dol
          else
            echo "ERROR: no .dol found after build."
            exit 1
          fi
          ls -lh iso_root/

      # ── 6. Build the ISO ──────────────────────────────────────────────────
      - name: Create ISO
        run: |
          genisoimage \
            -o wii-ai-chatbot.iso \
            -V "WII_AI_CHATBOT" \
            -iso-level 2 \
            -r \
            iso_root/
          echo "ISO size: $(du -sh wii-ai-chatbot.iso | cut -f1)"

      # ── 7. Upload artifact ────────────────────────────────────────────────
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-ai-chatbot-iso
          path: wii-ai-chatbot.iso

      # ── 8. Release on tag ─────────────────────────────────────────────────
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wii-ai-chatbot.iso
          body: |
            ## WII-AI Chatbot — CD-ROM Image
            AI model baked in. Just burn to a CD-R and boot.

      # ── 9. Rolling latest release on main push ────────────────────────────
      - name: Create latest release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: wii-ai-chatbot.iso
          body: |
            ## Latest Build — WII-AI Chatbot (CD-ROM)
            AI model baked in. Just burn to a CD-R and boot.
