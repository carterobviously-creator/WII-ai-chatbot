name: Build WII-AI Chatbot ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: compile the Wii DOL inside the devkitPPC container ─────────────
  build-dol:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DOL
        run: |
          cd wii
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      - name: Upload DOL artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-dol
          path: |
            wii/app.dol
            wii/boot.dol
          if-no-files-found: error

  # ── Job 2: download model, build ISO, publish release ─────────────────────
  build-iso:
    needs: build-dol
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -y && sudo apt-get install -y genisoimage curl

      - name: Download DOL artifact
        uses: actions/download-artifact@v4
        with:
          name: wii-dol
          path: wii-dol

      - name: Download AI model (with many fallbacks)
