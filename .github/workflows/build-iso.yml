name: Build Wii Homebrew Package

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build DOL
        run: |
          cd wii
          make
        env:
          DEVKITPRO: /opt/devkitpro
          DEVKITPPC: /opt/devkitpro/devkitPPC

      - name: Package as Homebrew Channel app
        run: |
          rm -rf dist
          mkdir -p dist/apps/wii-ai-chatbot

          # Current Makefile target emits app.dol. Keep boot.dol fallback for compatibility.
          if [ -f wii/boot.dol ]; then
            cp wii/boot.dol dist/apps/wii-ai-chatbot/boot.dol
          elif [ -f wii/app.dol ]; then
            cp wii/app.dol dist/apps/wii-ai-chatbot/boot.dol
          else
            echo "No DOL output found. Expected wii/boot.dol or wii/app.dol."
            exit 1
          fi

          cp wii/meta.xml dist/apps/wii-ai-chatbot/meta.xml
          (cd dist && zip -r ../wii-ai-chatbot-sd.zip apps)

      - name: Upload SD package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wii-ai-chatbot-sd
          path: wii-ai-chatbot-sd.zip

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wii-ai-chatbot-sd.zip
          body: |
            ## WII-AI Chatbot — Homebrew Channel Package

            1. Download `wii-ai-chatbot-sd.zip`
            2. Extract the zip to the root of your SD card (it already contains `apps/wii-ai-chatbot/`)
            3. Insert SD card into your Wii
            4. Open Homebrew Channel
            5. Launch **WII-AI Chatbot**

      - name: Create latest release (on main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          prerelease: true
          files: wii-ai-chatbot-sd.zip
          body: |
            ## Latest Build — WII-AI Chatbot (Homebrew Channel)

            1. Download `wii-ai-chatbot-sd.zip`
            2. Extract the zip to the root of your SD card (it already contains `apps/wii-ai-chatbot/`)
            3. Insert SD card into your Wii
            4. Open Homebrew Channel
            5. Launch **WII-AI Chatbot**
