<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WII-AI Chatbot</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: linear-gradient(#f7fbff,#e4eef7); color: #1d3557; }
    .wrap { max-width: 900px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 18px 16px 10px; text-align: center; }
    h1 { margin: 0; font-size: clamp(1.4rem,4vw,2rem); color: #0b5cab; }
    .status { font-size: .95rem; color: #3a6ea5; margin-top: 6px; }
    #chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 12px 14px; border-radius: 16px; font-size: 1rem; line-height: 1.35; box-shadow: 0 1px 2px rgba(0,0,0,.08); }
    .user { align-self: flex-end; background: #1389ff; color: #fff; border-bottom-right-radius: 4px; }
    .ai { align-self: flex-start; background: #edf2f7; color: #1b2d42; border-bottom-left-radius: 4px; }
    form { display: flex; gap: 10px; padding: 12px; background: #ffffffcc; border-top: 1px solid #d6e3f2; position: sticky; bottom: 0; }
    input { flex: 1; font-size: 1rem; border: 1px solid #aac8e8; border-radius: 12px; padding: 12px; }
    button { font-size: 1rem; font-weight: 600; border: none; border-radius: 12px; padding: 12px 18px; background: #0b5cab; color: white; min-width: 82px; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>WII-AI Chatbot 🎮</h1>
      <div class="status">Connected to Wii AI Server</div>
    </header>
    <main id="chat" aria-live="polite"></main>
    <form id="chatForm">
      <input id="message" placeholder="Ask the Wii anything..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('chatForm');
    const message = document.getElementById('message');

    function addBubble(text, who) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    addBubble("Hello! I'm an AI running on a Nintendo Wii. Ask me anything!", 'ai');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = message.value.trim();
      if (!text) return;
      addBubble(text, 'user');
      message.value = '';
      try {
        const res = await fetch('/chat?msg=' + encodeURIComponent(text));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        addBubble(data.response || 'No response from Wii AI.', 'ai');
      } catch (err) {
        addBubble('Connection error. Make sure your iPad is on the same WiFi as the Wii.', 'ai');
      }
    });
  </script>
</body>
</html>
